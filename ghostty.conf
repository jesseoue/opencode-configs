# ── Ghostty config for OpenCode ───────────────────────────────────
# Symlink to ~/.config/ghostty/config
# Optimized for OpenCode + oh-my-openagent + long coding sessions.

# Font
font-family = JetBrainsMono Nerd Font Mono
font-size = 14
font-thicken = true

# Theme
theme = Catppuccin Mocha
minimum-contrast = 1.1
bold-is-bright = true

# Window
window-padding-x = 8
window-padding-y = 8
window-padding-balance = true
macos-titlebar-style = tabs
window-save-state = always
window-vsync = true
window-colorspace = display-p3
unfocused-split-opacity = 0.85

# macOS behavior
macos-option-as-alt = true
auto-update = off

# Shell integration
shell-integration = zsh
shell-integration-features = cursor,sudo,title

# Clipboard
copy-on-select = clipboard

# Cursor
cursor-style = bar
cursor-style-blink = true

# Scrollback — large for long opencode sessions
scrollback-limit = 200000

# Mouse
mouse-hide-while-typing = true

# Keybindings — opencode friendly
keybind = cmd+enter=toggle_fullscreen
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+shift+enter=toggle_split_zoom
keybind = ctrl+shift+t=new_tab
keybind = ctrl+shift+w=close_surface

# Quick terminal (global hotkey)
keybind = global:ctrl+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-screen = mouse

# Don't confirm when closing with running processes — opencode handles cleanup
confirm-close-surface = false

# Resize overlay — minimal
resize-overlay = never

# Silence bells + never notify on command finish (OpenCode is noisy otherwise)
notify-on-command-finish = never
bell-features = no-system,no-audio,no-attention,no-title,no-border
bell-audio-volume = 0
