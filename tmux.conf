# ── OpenCode tmux.conf ────────────────────────────────────────────
# Symlinked to ~/.tmux.conf (installer / oc setup).
# Tuned for: Ghostty + OpenCode TUI + oh-my-openagent team panes (main-vertical).
# Requires tmux ≥ 3.3 (allow-passthrough, modern terminal-features). Supported: 3.7+.
#
# Reload: prefix + r   |   Outside tmux: tmux source-file ~/.tmux.conf

# ── Terminal / color (Ghostty + OpenCode) ─────────────────────────
set -g default-terminal "tmux-256color"
# Truecolor + RGB for Ghostty / xterm-256color (OpenCode forces TERM=xterm-256color)
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"
# tmux 3.2+ feature flags (undercurl, RGB, clipboard, hyperlinks)
set -as terminal-features ",xterm-256color:RGB:clipboard:ccolour:cstyle:focus:title"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:ccolour:cstyle:focus:title"
set -as terminal-features ",tmux-256color:RGB:clipboard:ccolour:cstyle:focus:title"
# Passthrough for modern terminals (OSC sequences from OpenCode / Ghostty)
set -g allow-passthrough on
set -ga update-environment "TERM_PROGRAM TERM_PROGRAM_VERSION COLORTERM"

# ── Input / responsiveness ────────────────────────────────────────
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g history-limit 200000
set -g aggressive-resize on
set -g repeat-time 400

# ── Windows / panes ───────────────────────────────────────────────
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g set-titles on
set -g set-titles-string '#S · #W · #{pane_current_command}'
# Keep panes readable when OmO team mode splits (main-vertical)
setw -g pane-border-status off
setw -g pane-border-format ' #{pane_index} #{pane_current_command} '
set -g other-pane-width 60%
set -g main-pane-width 60%

# ── Status bar ────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold]#S #[fg=colour240]| "
set -g status-right "#[fg=colour240]#(whoami)@#h #[fg=cyan]%Y-%m-%d %H:%M "
set -g status-left-length 48
set -g status-right-length 48
set -g status-interval 5
set -g window-status-current-style "fg=cyan,bold"
set -g window-status-style "fg=colour245"
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=cyan"

# ── Keybinds (prefix = C-b — does NOT steal OpenCode Ctrl+X leader) ─
unbind C-b
set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux: reloaded ~/.tmux.conf"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# ── Copy mode (vi + macOS clipboard) ──────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
# Mouse drag → clipboard (when mouse on)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── OmO team mode helpers ─────────────────────────────────────────
# Toggle input sync across panes (broadcast to all team panes)
bind S setw synchronize-panes \; display-message "sync: #{?pane_synchronized,ON,OFF}"
# Layout shortcuts matching OmO main-vertical / even / tiled
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind M select-layout main-vertical
bind T select-layout tiled
bind Z resize-pane -Z

# ── Long session stability ────────────────────────────────────────
set -g destroy-unattached off
set -g remain-on-exit off
set -g detach-on-destroy off
set -g bell-action none
setw -g monitor-bell off
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ── Terminal cleanup on pane kill (no alt-screen clear) ───────────
# Resets mouse tracking + bracketed paste only — never \033[?1049l
bind-key x confirm-before -p "kill-pane #P? (y/n)" "kill-pane; run-shell 'printf \"\\033[?1000l\\033[?1002l\\033[?1003l\\033[?1006l\\033[?2004l\" > /dev/tty 2>/dev/null; stty sane 2>/dev/null || true'"
